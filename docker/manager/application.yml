server:
  port: 80
  tomcat:
    accept-count: 1000
    max-connections: 10000

spring:
  application:
    name: know-streaming
  profiles:
    active: dev
  main:
    allow-bean-definition-overriding: true
  jackson:
    time-zone: GMT+8
  datasource:
    know-streaming:
      jdbc-url: jdbc:mariadb://SERVER_MYSQL_ADDRESS/SERVER_MYSQL_DB?useUnicode=true&characterEncoding=utf8&jdbcCompliantTruncation=true&allowMultiQueries=true&useSSL=false&alwaysAutoGeneratedKeys=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      username: SERVER_MYSQL_USER
      password: SERVER_MYSQL_PASSWORD
      driver-class-name: org.mariadb.jdbc.Driver
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-test-query: SELECT 1
  logi-job:
    enable: true
    jdbc-url: jdbc:mariadb://SERVER_MYSQL_ADDRESS/SERVER_MYSQL_DB?useUnicode=true&characterEncoding=utf8&jdbcCompliantTruncation=true&allowMultiQueries=true&useSSL=false&alwaysAutoGeneratedKeys=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: SERVER_MYSQL_USER
    password: SERVER_MYSQL_PASSWORD
    driver-class-name: org.mariadb.jdbc.Driver
    max-lifetime: 60000
    init-sql: true
    init-thread-num: 20
    max-thread-num: 50
    log-expire: 3
    app-name: know-streaming
    claim-strategy: com.didiglobal.logi.job.core.consensual.RandomConsensual
  logi-security:
    jdbc-url: jdbc:mariadb://SERVER_MYSQL_ADDRESS/SERVER_MYSQL_DB?useUnicode=true&characterEncoding=utf8&jdbcCompliantTruncation=true&allowMultiQueries=true&useSSL=false&alwaysAutoGeneratedKeys=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: SERVER_MYSQL_USER
    password: SERVER_MYSQL_PASSWORD
    driver-class-name: org.mariadb.jdbc.Driver
    app-name: know-streaming
    resource-extend-bean-name: myResourceExtendImpl
    login-extend-bean-name: logiSecurityDefaultLoginExtendImpl

logging:
  config: classpath:logback-spring.xml

thread-pool:
  scheduled:
    thread-num: 2
  collector:
    future-util:
      num: 3
      thread-num: 64
      queue-size: 10000
      select-suitable-enable: true
      suitable-queue-size: 1000
  task:
    metrics:
      thread-num: 18
      queue-size: 180
    metadata:
      thread-num: 27
      queue-size: 270
    common:
      thread-num: 15
      queue-size: 150
  es:
    search:
      thread-num: 20
      queue-size: 10000

client-pool:
  kafka-consumer:
    min-idle-client-num: 2
    max-idle-client-num: 20
    max-total-client-num: 20
    borrow-timeout-unit-ms: 5000
  kafka-admin:
    client-cnt: 1

es:
  client:
    address: SERVER_ES_ADDRESS
    client-cnt: 10
    io-thread-cnt: 2
    max-retry-cnt: 5
  index:
    expire: 15

management:
  endpoints:
    web:
      base-path: /metrics
      exposure:
        include: '*'
  health:
    elasticsearch:
      enabled: false
  metrics:
    export:
      prometheus:
        descriptions: true
        enabled: true
    tags:
      application: know-streaming
